kind = "web"
previewPath = "/"
title = "Rippl — Patient Referral Platform"
version = "1.0.0"
id = "artifacts/rippl"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18918

[services.development]
run = "pnpm --filter @workspace/rippl run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rippl", "run", "build" ]
publicDir = "artifacts/rippl/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18918"
BASE_PATH = "/"
