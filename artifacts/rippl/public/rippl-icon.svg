<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0d9488" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- Rippl wave / droplet icon — centered -->
  <!-- Large center drop -->
  <ellipse cx="256" cy="230" rx="52" ry="72" fill="white" opacity="0.95"/>
  <!-- Teardrop tip -->
  <polygon points="256,148 214,230 298,230" fill="white" opacity="0.95"/>

  <!-- Left small drop -->
  <ellipse cx="152" cy="270" rx="34" ry="48" fill="white" opacity="0.6"/>
  <polygon points="152,208 124,270 180,270" fill="white" opacity="0.6"/>

  <!-- Right small drop -->
  <ellipse cx="360" cy="270" rx="34" ry="48" fill="white" opacity="0.6"/>
  <polygon points="360,208 332,270 388,270" fill="white" opacity="0.6"/>

  <!-- Base wave line -->
  <rect x="100" y="318" width="312" height="16" rx="8" fill="white" opacity="0.3"/>
  <rect x="140" y="346" width="232" height="12" rx="6" fill="white" opacity="0.18"/>
  <rect x="180" y="370" width="152" height="10" rx="5" fill="white" opacity="0.10"/>
</svg>
