<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 650px; height: 150px; overflow: hidden; }

  .header {
    width: 650px;
    height: 150px;
    background: linear-gradient(135deg, #F5A623 0%, #E0622A 100%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
  }

  .logo {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    color: rgba(255,255,255,0.70);
    letter-spacing: -1px;
  }
  .logo span {
    color: #ffffff;
  }

  .divider {
    width: 1px;
    height: 60px;
    background: rgba(255,255,255,0.30);
    margin: 0 36px;
  }

  .tagline {
    flex: 1;
  }
  .tagline p {
    font-family: system-ui, -apple-system, sans-serif;
    color: #ffffff;
    line-height: 1.4;
  }
  .tagline .title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .tagline .sub {
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.80);
  }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">rip<span>pl</span></div>
    <div class="divider"></div>
    <div class="tagline">
      <p class="title">Your referral reward is here!</p>
      <p class="sub">Thank you for sharing us with a friend.</p>
    </div>
  </div>
</body>
</html>
