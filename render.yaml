services:
  - type: web
    name: rippl
    env: node
    buildCommand: "npm install -g pnpm && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/rippl run build"
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
